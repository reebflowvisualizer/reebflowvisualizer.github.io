<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reeb Flow Visualizer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      background: #ffffff;
      border: 1px solid #dbe3ec;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #111827;
    }
    select {
      height: 30px;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #111827;
      padding: 0 8px;
    }
    p {
      margin: 0;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <header>
    <label>
      Dataset
      <select id="datasetSelect"></select>
    </label>
  </header>
  <p>Opening dataset viewer...</p>
  <script>
    const DATASETS = [
  {
    "id": "torus",
    "label": "torus",
    "path": "datasets/torus/index.html",
    "timesteps": 100,
    "media_files": 1978,
    "media_size_bytes": 85852988,
    "dataset_size_bytes": 104913038,
    "includes_fiber_surfaces": false
  },
  {
    "id": "MVK_s1",
    "label": "MVK s1",
    "path": "datasets/MVK_s1/index.html",
    "timesteps": 83,
    "media_files": 3320,
    "media_size_bytes": 342577349,
    "dataset_size_bytes": 388948128,
    "includes_fiber_surfaces": true
  },
  {
    "id": "MVK_s2",
    "label": "MVK s2",
    "path": "datasets/MVK_s2/index.html",
    "timesteps": 82,
    "media_files": 3280,
    "media_size_bytes": 492912031,
    "dataset_size_bytes": 539366852,
    "includes_fiber_surfaces": true
  }
];
    const select = document.getElementById("datasetSelect");
    const params = new URLSearchParams(window.location.search);
    const requested = params.get("dataset") || "torus";

    for (const dataset of DATASETS) {
      const option = document.createElement("option");
      option.value = dataset.id;
      option.textContent = dataset.label;
      select.appendChild(option);
    }

    function openDataset(id) {
      const dataset = DATASETS.find(item => item.id === id) || DATASETS[0];
      if (!dataset) return;
      select.value = dataset.id;
      window.location.replace(`datasets/${dataset.id}/index.html`);
    }

    select.addEventListener("change", () => openDataset(select.value));
    openDataset(requested);
  </script>
</body>
</html>
